<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Điểm danh sự kiện — TBit SmartID</title>
<link rel="stylesheet" href="/css/style.css">
<script>(function(){try{var t=localStorage.getItem("tbit-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
</head>
<body>

<div class="checkin-page">
  <img class="checkin-logo" src="/img/logo.svg" alt="TBit SmartID">
  <div class="event-name" id="eventName">…</div>
  <div class="event-sub" id="eventSub" data-i18n="checkin.sub">Nhập thông tin để xác nhận có mặt</div>

  <!-- Form điểm danh / ghi danh (các ô nhập được sinh theo loại phiên) -->
  <div class="card" id="formCard">
    <div id="alert" class="alert hidden"></div>
    <form id="form">
      <div id="fieldsBox"></div>
      <button class="btn full big" type="submit" id="btnSubmit" data-i18n="checkin.submit">✓ Điểm danh</button>
    </form>
    <div id="openSwitch" class="hidden" style="text-align:center;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <span class="muted" data-i18n="checkin.notInList">Không có trong danh sách?</span><br>
      <button class="link-btn" type="button" id="btnShowOpen" data-i18n="checkin.regHere">Ghi danh tại đây »</button>
    </div>
  </div>

  <!-- Màn hình thành công -->
  <div class="card success-screen hidden" id="successCard">
    <div class="icon" id="successIcon">✓</div>
    <h2 id="successName"></h2>
    <div class="sub" id="successUnit"></div>
    <p class="mt" id="successMsg"></p>
    <p class="muted mt" id="successTime"></p>
  </div>

  <!-- Phiên đóng -->
  <div class="card success-screen hidden" id="closedCard">
    <div class="icon warn">!</div>
    <h2 data-i18n="checkin.closedTitle">Phiên điểm danh chưa mở</h2>
    <p class="sub" data-i18n="checkin.closedDesc">Phiên chưa bắt đầu hoặc đã kết thúc điểm danh. Vui lòng liên hệ ban tổ chức.</p>
  </div>
</div>

<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/shell.js"></script>
<script>
const token = location.pathname.split('/').pop();
const code = new URLSearchParams(location.search).get('c') || '';
let info = null;
let openMode = false; // đang ở nhánh ghi danh tự do (walk-in) của phiên danh sách

// Thuộc tính ô nhập theo loại trường
const INPUT_ATTRS = {
  cccd: 'inputmode="numeric" pattern="[0-9]*" maxlength="12" placeholder="001099012345" autocomplete="off"',
  phone: 'inputmode="tel" maxlength="12" placeholder="0912345678" autocomplete="tel"',
  email: 'type="email" placeholder="ten@example.com" autocomplete="email"',
  full_name: 'autocomplete="name" maxlength="120"',
};

function fieldInputs(fields, withRequiredMark) {
  return fields.map((f, i) => `
    <label for="f_${i}">${esc(f.label)}${withRequiredMark ? (f.required ? ' <span style="color:var(--red);">*</span>' : ' <span class="muted">(không bắt buộc)</span>') : ''}</label>
    <input id="f_${i}" data-key="${esc(f.key)}" ${INPUT_ATTRS[f.key] || 'maxlength="200"'} ${f.required ? 'required' : ''}>`).join('');
}

function reqMark(f) {
  return f.required ? ' <span style="color:var(--red);">*</span>' : ` <span class="muted">${t('checkin.optional')}</span>`;
}
function fieldInputsL(fields, mark) {
  return fields.map((f, i) => `
    <label for="f_${i}">${esc(f.label)}${mark ? reqMark(f) : ''}</label>
    <input id="f_${i}" data-key="${esc(f.key)}" ${INPUT_ATTRS[f.key] || 'maxlength="200"'} ${f.required ? 'required' : ''}>`).join('');
}

function renderForm() {
  if (info.type === 'open') {
    el('eventSub').textContent = t('checkin.subOpen');
    el('btnSubmit').textContent = t('checkin.submitReg');
    el('fieldsBox').innerHTML = fieldInputsL(info.fields, true);
    return;
  }
  if (openMode) {
    // Nhánh ghi danh tự do trên phiên theo danh sách
    el('eventSub').textContent = t('checkin.subWalkin');
    el('btnSubmit').textContent = t('checkin.submitReg');
    el('fieldsBox').innerHTML = fieldInputsL(info.open_fields, true);
    el('openSwitch').classList.add('hidden');
    return;
  }
  // Điểm danh theo danh sách: chỉ nhập các trường bắt buộc do BTC cấu hình
  el('eventSub').textContent = t('checkin.sub');
  el('btnSubmit').textContent = t('checkin.submit');
  el('fieldsBox').innerHTML = fieldInputsL((info.checkin_fields || []).map((f) => ({ ...f, required: true })), false);
  el('openSwitch').classList.toggle('hidden', !info.allow_open);
}

async function boot() {
  try {
    info = await api(`/api/checkin/${token}/info?lang=${window.I18N_LANG || 'vi'}`);
    el('eventName').textContent = info.name;
    if (info.status !== 'open' && info.status !== 'supplement') {
      hide('formCard'); show('closedCard');
      return;
    }
    renderForm();
  } catch (e) {
    el('eventName').textContent = t('checkin.notFound');
    el('eventSub').textContent = '';
    hide('formCard');
  }
}

el('form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  clearAlert('alert');
  const btn = el('btnSubmit');
  const btnLabel = btn.textContent;
  btn.disabled = true; btn.textContent = t('checkin.processing');
  try {
    const values = {};
    el('fieldsBox').querySelectorAll('input[data-key]').forEach((inp) => { values[inp.dataset.key] = inp.value; });
    const body = { values, c: code };
    if (info.type !== 'open' && openMode) body.mode = 'open'; // nhánh ghi danh tự do
    const r = await api(`/api/checkin/${token}`, { method: 'POST', body });
    hide('formCard'); show('successCard');
    el('successName').textContent = r.full_name;
    el('successUnit').textContent = r.unit || '';
    el('successMsg').textContent = r.message;
    el('successTime').textContent = `${t('checkin.time')}: ${r.checked_in_at}`;
    if (r.flagged) el('successIcon').classList.add('warn'), el('successIcon').textContent = '!';
  } catch (e) {
    showAlert('alert', e.message);
    btn.disabled = false; btn.textContent = btnLabel;
  }
});

el('btnShowOpen').addEventListener('click', () => { openMode = true; clearAlert('alert'); renderForm(); });

boot();
</script>
</body>
</html>
